<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">🚗 CarWay</div>

        <nav>
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="admin-cars.html">Cars</a>
            <a href="admin-inventory.html">Inventory</a>
            <a href="admin-sales-history.html">Sales History</a>
            <a href="index.html" onclick="logout()">Logout</a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- TOPBAR -->
        <div class="topbar">
            <input type="text" placeholder="Search cars...">
            <div class="user">Admin</div>
        </div>

        <!-- STATS -->
        <div class="stats">
            <div class="card stat-card">🚗 Total Cars: <span id="totalCars">0</span></div>
            <div class="card stat-card">✅ Available: <span id="availableCars">0</span></div>
            <div class="card stat-card">💰 Sold: <span id="soldCars">0</span></div>
            <div class="card stat-card">💰 Total Revenue: <span id="totalRevenue">0</span></div>
            <div class="card stat-card">🧾 Total Sales: <span id="totalSales">0</span></div>
        </div>

        <div class="card">
             <h3>Car Status Overview</h3>
             <canvas id="statusChart"></canvas>
       </div>

        <div class="card">
            <h3>Sales Overview</h3>
            <canvas id="salesChart"></canvas>
        </div>

        <!-- CONTENT -->
        <div class="card">
            <h2>Welcome Admin</h2>
            <p>Manage your dealership system.</p>
        </div>

    </main>

</div>

<script src="app.js"></script>

<script>
    loadDashboardStats();
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
